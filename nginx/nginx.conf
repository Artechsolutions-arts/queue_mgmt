upstream queue_backend {
    server queue-service:8000;
}

upstream frontend {
    server frontend:5173;
}

# Redirect all HTTP → HTTPS
server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name _;

    # ── TLS ──────────────────────────────────────────────────────────────────
    # In production: replace with real certs from Let's Encrypt / your CA.
    # For dev: generate with: openssl req -x509 -nodes -days 365 -newkey rsa:2048
    #          -keyout nginx/certs/server.key -out nginx/certs/server.crt -subj "/CN=localhost"
    ssl_certificate     /etc/nginx/certs/server.crt;
    ssl_certificate_key /etc/nginx/certs/server.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # ── Security headers ─────────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self' wss:; font-src 'self';" always;

    client_max_body_size 10M;

    # ── Django API ────────────────────────────────────────────────────────────
    location /api/ {
        proxy_pass http://queue_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── WebSocket ─────────────────────────────────────────────────────────────
    location /ws/ {
        proxy_pass http://queue_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }

    # ── Django admin static files ─────────────────────────────────────────────
    location /static/ {
        proxy_pass http://queue_backend;
    }

    # ── Frontend (dev) ────────────────────────────────────────────────────────
    location / {
        proxy_pass http://frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
